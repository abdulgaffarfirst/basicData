<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Reacharge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <form method="post" action="" name="contact-form">
      <h2>মোবাইল রির্চাজ নিতে ফরর্ম পূরণ করুন</h2>
      <input type="text" name="your-name" placeholder="আপনার নাম ">
      <input type="number" name="your-number" placeholder="মোবাইল নাম্বার">
      <input type="email" name="your-email" placeholder="আপনার ইমেল">
      <input type="number" name="your-age" placeholder="আপনার বয়স">
      <input type="submit" value="Submit" id="submit">
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
